<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakerfield AI Proxy — Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
        .status-dot.connected { background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1rem; }
        .stat-card h3 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
        .events-section h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 1rem; }
        .events-list { background: #1e293b; border: 1px solid #334155; border-radius: 8px; height: 500px; overflow-y: auto; padding: 0.5rem; }
        .event { padding: 0.5rem 0.75rem; border-bottom: 1px solid #0f172a; font-size: 0.875rem; display: flex; gap: 0.75rem; align-items: flex-start; }
        .event:last-child { border-bottom: none; }
        .event-time { color: #64748b; font-size: 0.75rem; white-space: nowrap; min-width: 80px; }
        .event-type { padding: 0.125rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
        .type-received { background: #1e3a5f; color: #38bdf8; }
        .type-forwarded { background: #1a3a2a; color: #22c55e; }
        .type-completed { background: #1a2e1a; color: #4ade80; }
        .type-failed { background: #3a1a1a; color: #f87171; }
        .event-detail { color: #94a3b8; flex: 1; word-break: break-all; }
        .empty-state { text-align: center; color: #475569; padding: 3rem; }
    </style>
</head>
<body>
    <header>
        <div class="status-dot" id="statusDot"></div>
        <h1>🤖 Lakerfield AI Proxy</h1>
        <span id="statusText" style="color:#64748b;font-size:0.875rem;">Connecting...</span>
    </header>

    <main>
        <div class="stats">
            <div class="stat-card">
                <h3>Total Requests</h3>
                <div class="value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <div class="value" id="statCompleted" style="color:#22c55e">0</div>
            </div>
            <div class="stat-card">
                <h3>Failed</h3>
                <div class="value" id="statFailed" style="color:#ef4444">0</div>
            </div>
            <div class="stat-card">
                <h3>Active</h3>
                <div class="value" id="statActive" style="color:#f59e0b">0</div>
            </div>
        </div>

        <div class="events-section">
            <h2>Live Request Stream</h2>
            <div class="events-list" id="eventsList">
                <div class="empty-state">Waiting for requests...</div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        let total = 0, completed = 0, failed = 0, active = 0;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const eventsList = document.getElementById('eventsList');

        function updateStats() {
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statCompleted').textContent = completed;
            document.getElementById('statFailed').textContent = failed;
            document.getElementById('statActive').textContent = active;
        }

        function addEvent(type, detail) {
            const empty = eventsList.querySelector('.empty-state');
            if (empty) empty.remove();

            const now = new Date().toLocaleTimeString();
            const typeClass = {
                'RequestReceived': 'type-received',
                'RequestForwarded': 'type-forwarded',
                'RequestCompleted': 'type-completed',
                'RequestFailed': 'type-failed'
            }[type] || 'type-received';

            const ev = document.createElement('div');
            ev.className = 'event';
            ev.innerHTML = `
                <span class="event-time">${now}</span>
                <span class="event-type ${typeClass}">${type.replace('Request', '')}</span>
                <span class="event-detail">${detail}</span>
            `;
            eventsList.insertBefore(ev, eventsList.firstChild);

            while (eventsList.children.length > 200) {
                eventsList.removeChild(eventsList.lastChild);
            }
        }

        const connection = new signalR.HubConnectionBuilder()
            .withUrl('/hubs/monitor')
            .withAutomaticReconnect()
            .build();

        connection.on('RequestReceived', (entry) => {
            total++; active++;
            updateStats();
            addEvent('RequestReceived', `[${entry.requestId?.substring(0, 8)}] ${entry.endpoint} model=${entry.model || 'unknown'} streaming=${entry.streaming}`);
        });

        connection.on('RequestForwarded', (data) => {
            addEvent('RequestForwarded', `[${data.requestId?.substring(0, 8)}] → ${data.instanceName}`);
        });

        connection.on('RequestCompleted', (entry) => {
            completed++; active = Math.max(0, active - 1);
            updateStats();
            addEvent('RequestCompleted', `[${entry.requestId?.substring(0, 8)}] ${entry.endpoint} status=${entry.statusCode} ${entry.durationMs}ms`);
        });

        connection.on('RequestFailed', (data) => {
            failed++; active = Math.max(0, active - 1);
            updateStats();
            addEvent('RequestFailed', `[${data.requestId?.substring(0, 8)}] ${data.error}`);
        });

        async function start() {
            try {
                await connection.start();
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Connected';
                console.log('SignalR connected');
            } catch (err) {
                statusText.textContent = 'Disconnected — retrying...';
                console.error('SignalR connection error:', err);
                setTimeout(start, 5000);
            }
        }

        connection.onreconnecting(() => {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Reconnecting...';
        });

        connection.onreconnected(() => {
            statusDot.className = 'status-dot connected';
            statusText.textContent = 'Connected';
        });

        connection.onclose(() => {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Disconnected';
        });

        start();
    </script>
</body>
</html>
